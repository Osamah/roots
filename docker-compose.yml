services:
  postgres:
    image: postgres:16-alpine
    container_name: roots-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: roots
      POSTGRES_PASSWORD: roots
      POSTGRES_DB: roots
    ports:
      - "5432:5432"
    volumes:
      - roots_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roots -d roots"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  roots_pgdata:
